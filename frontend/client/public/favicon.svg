<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0c1225"/>
    </linearGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Outer hex -->
  <polygon points="16,2 26,7.5 26,18.5 16,24 6,18.5 6,7.5" fill="url(#hex)"/>
  <!-- Cyan hex edge highlight -->
  <polygon points="16,2 26,7.5 26,18.5 16,24 6,18.5 6,7.5" fill="none" stroke="#22d3ee" stroke-width="0.6" opacity="0.7"/>
  <!-- Inner dark hex -->
  <polygon points="16,6 22.5,9.75 22.5,17.25 16,21 9.5,17.25 9.5,9.75" fill="url(#inner)"/>
  <!-- Cross-hair -->
  <line x1="16" y1="10" x2="16" y2="17" stroke="url(#cross)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12" y1="13.5" x2="20" y2="13.5" stroke="url(#cross)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="16" cy="13.5" r="1.4" fill="#22d3ee"/>
</svg>
