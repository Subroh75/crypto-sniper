[build]
  # Base directory is the frontend folder itself (set in Netlify UI as "frontend/")
  command = "npm install && npm run build"
  publish = "dist/public"

[build.environment]
  VITE_API_BASE = "https://crypto-sniper.onrender.com"
  NODE_VERSION = "20"

# SPA fallback - all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"
