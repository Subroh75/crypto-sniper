name: Keep-Alive Ping

# NOTE: GitHub Actions scheduled cron is unreliable on private repos —
# it can be skipped or delayed by 30+ minutes under load.
# Primary pinger: set up cron-job.org (free) to hit /warmup every 5 minutes.
# See: https://cron-job.org → New Job → URL: https://crypto-sniper-api.onrender.com/warmup
#
# This workflow acts as a secondary fallback — manual trigger + CI event hooks.

on:
  workflow_dispatch:        # manual trigger from GitHub Actions UI
  push:
    branches: [main]        # ping on every deploy so service is warm post-deploy

jobs:
  ping:
    name: Ping & Warmup Render API
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Wait for Render deploy to settle
        if: github.event_name == 'push'
        run: sleep 30   # give Render ~30s to swap the container after autodeploy

      - name: Ping /ping (liveness)
        id: ping
        run: |
          echo "Hitting /ping..."
          RESPONSE=$(curl --silent --show-error --fail --max-time 60 \
            "https://crypto-sniper-api.onrender.com/ping")
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          echo "✅ $(date -u '+%Y-%m-%d %H:%M:%S UTC') — $RESPONSE"

      - name: Warmup /warmup (Kronos inference)
        run: |
          echo "Hitting /warmup to prime Kronos..."
          RESPONSE=$(curl --silent --show-error --fail --max-time 120 \
            "https://crypto-sniper-api.onrender.com/warmup")
          echo "🔥 $(date -u '+%Y-%m-%d %H:%M:%S UTC') — $RESPONSE"

          WARM=$(echo "$RESPONSE" | python3 -c \
            "import sys, json; d=json.load(sys.stdin); print(d.get('warm', False))")
          LOADED=$(echo "$RESPONSE" | python3 -c \
            "import sys, json; d=json.load(sys.stdin); print(d.get('kronos_loaded', False))")

          if [ "$WARM" = "True" ]; then
            echo "🧠 Kronos is warm and ready"
          elif [ "$LOADED" = "True" ]; then
            echo "💤 Kronos loaded but warmup inference failed — check /docs"
          else
            echo "❌ Kronos not available on this deployment"
          fi
