name: Keep-Alive Ping

on:
  schedule:
    - cron: "*/9 * * * *"   # every 9 min — under Render's 15-min spin-down threshold
  workflow_dispatch:          # manual trigger from GitHub Actions UI
  push:
    branches: [main]          # also ping on every deploy

jobs:
  ping:
    name: Ping & Warmup Render API
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Wait for Render deploy to settle
        if: github.event_name == 'push'
        run: sleep 45

      - name: Ping /ping (liveness check)
        id: ping
        run: |
          echo "Hitting /ping..."
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --max-time 30 "https://crypto-sniper.onrender.com/ping")
          echo "HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ $(date -u '+%Y-%m-%d %H:%M:%S UTC') — API is up"
          else
            echo "⚠️  $(date -u '+%Y-%m-%d %H:%M:%S UTC') — API returned HTTP $STATUS (cold start expected)"
          fi

      - name: Warmup /warmup (keep Kronos hot)
        run: |
          echo "Hitting /warmup..."
          RESPONSE=$(curl --silent --max-time 60 \
            "https://crypto-sniper.onrender.com/warmup" || echo "{}")
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC') — $RESPONSE"
