[build]
  base    = "frontend/client"
  command = "npm run build"
  publish = "frontend/client/dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
