services:
  - type: web
    name: crypto-sniper-api
    runtime: python
    region: singapore
    plan: standard
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://crypto.guru,http://localhost:5173
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: HELIUS_API_KEY
        sync: false
    autoDeploy: true
