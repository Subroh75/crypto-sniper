services:
  - type: web
    name: crypto-sniper-api
    runtime: python
    region: singapore
    plan: standard
    buildCommand: >
      pip install --no-cache-dir torch==2.2.2
      --index-url https://download.pytorch.org/whl/cpu
      && pip install --no-cache-dir -r requirements-api.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://crypto.guru,http://localhost:5173
      - key: PYTHON_VERSION
        value: "3.11.9"
    autoDeploy: true
